# This pipeline defines stages that control running and evaluating algorithms
# We define one stage per data set, using 'foreach' to iterate over the algorithms
# that we want to run on it.
#
# We can't really iterate over Cartesian products very easily in the DVC repetition
# system, so we do need to repeat a stage for each data set.
#
# You can make additional non-repeated stages to run one algorithm on one data set.
stages:
  explicit-recs:
    matrix:
      data:
        - ml-100k
        - ml-latest-small
        - ml-1m
        - ml-10m
        - ml-20m
        - ml-25m
        - ml-32m
      pipeline:
        - bias
        - iknn-explicit
        - uknn-explicit
        - als-explicit
        - flex-explicit
    cmd: python run-pipeline.py -d data/${item.data} -o runs/${item.data}/${item.pipeline} pipelines/${item.pipeline}.toml
    wdir: ..
    deps:
      - run-pipeline.py
      - pipelines/${item.pipeline}.toml
      - data/${item.data}/
    outs:
      - runs/${item.data}/${item.pipeline}/

  implicit-recs:
    matrix:
      data:
        - ml-100k
        - ml-latest-small
        - ml-1m
        - ml-10m
        - ml-20m
        - ml-25m
        - ml-32m
      pipeline:
        - popular
        - iknn-implicit
        - uknn-implicit
        - als-implicit
        - flex-logistic
        - flex-bpr
        - flex-warp
    cmd: python run-pipeline.py -d data/${item.data} -o runs/${item.data}/${item.pipeline} --no-predict pipelines/${item.pipeline}.toml
    wdir: ..
    deps:
      - run-pipeline.py
      - pipelines/${item.pipeline}.toml
      - data/${item.data}/
    outs:
      - runs/${item.data}/${item.pipeline}/
