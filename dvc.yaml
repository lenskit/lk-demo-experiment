# This pipeline defines top-level output stages.
stages:
  # generate recommendations for test data
  generate-recs:
    matrix:
      data:
        - ml-100k
        - ml-latest-small
        - ml-1m
        - ml-10m
        - ml-20m
        - ml-25m
        - ml-32m
      pipeline:
        - bias
        - popular
        - iknn-explicit
        - iknn-implicit
        - uknn-explicit
        - uknn-implicit
        - als-explicit
        - als-implicit
        - flex-explicit
        - flex-logistic
        - flex-bpr
        - flex-warp
    cmd: python run-pipeline.py -d data/${item.data} -o runs/${item.data}/${item.pipeline} pipelines/${item.pipeline}.toml
    deps:
      - run-pipeline.py
      - pipelines/${item.pipeline}.toml
      - data/${item.data}/
    outs:
      - runs/${item.data}/${item.pipeline}/

  eval-report-template:
    cmd: jupytext --to ipynb eval-report.md
    deps:
      - eval-report.md
    outs:
      - eval-report.ipynb:
          cache: false

  eval-report:
    foreach:
      - ml-100k
      - ml-latest-small
      - ml-1m
      - ml-10m
      - ml-20m
      - ml-25m
      - ml-32m
    do:
      cmd: papermill -r dataset ${item} eval-report.ipynb eval-report.${item}.ipynb
      deps:
        - eval-report.ipynb
        - runs/${item}/
      outs:
        - eval-report.${item}.ipynb:
            cache: false
      metrics:
        - eval-metrics.${item}.json:
            cache: false

  render-report:
    foreach:
      - ml-100k
      - ml-latest-small
      - ml-1m
      - ml-10m
      - ml-20m
      - ml-25m
      - ml-32m
    do:
      cmd: jupyter nbconvert --to html eval-report.${item}.ipynb
      deps:
        - eval-report.${item}.ipynb
      outs:
        - eval-report.${item}.html
